title: Blog
description: > # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
permalink: ':title/'
baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Shreyaa Sharma # add your name
author-img: replace8.jpeg # add your photo
about-author: GSoC'21 @Ceph Organization. Outreachy'20 @PublicLab. Developer @SDSLabs. # add description
social-twitter: cypherean # add your Twitter handle
social-facebook: # add your Facebook handle
social-github: cypherean # add your Github handle
social-linkedin: cypherean # add your Linkedin handle
social-email: shreyasharma.ss305@gmail.com # add your Email address

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
